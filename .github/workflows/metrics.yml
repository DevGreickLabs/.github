name: Metrics

on:
  schedule: [{cron: "0 4 * * *"}]
  workflow_dispatch:
  push:
    branches: ["main"]
    paths: [".github/workflows/metrics.yml"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: DevGreickLabs
          template: classic
          filename: profile/github-metrics.svg
          base: header, repositories
          extras_css: |
            .footer, [data-name="metadata"] { display: none !important; }
            .avatar, image.avatar { display: none !important; }
          config_timezone: America/Sao_Paulo
          config_padding: 0, 8 + 11%
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_followup: yes
          plugin_followup_sections: repositories
          plugin_people: yes
          plugin_people_types: members
          plugin_people_size: 28
          plugin_people_limit: 24
